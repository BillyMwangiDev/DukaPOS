name: DukaPOS Production CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: electron/src/renderer/package-lock.json

      - name: Install Renderer Dependencies
        working-directory: electron/src/renderer
        run: npm ci --legacy-peer-deps

      - name: Lint Renderer (TypeScript)
        working-directory: electron/src/renderer
        run: npx tsc --noEmit

      - name: Security Audit (NPM)
        working-directory: electron/src/renderer
        run: npm audit --audit-level=high

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'

      - name: Install Python Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pip-audit

      - name: Lint Backend (Ruff)
        working-directory: backend
        run: ruff check app main.py --select E,F,W --ignore E501

      - name: Security Audit (Python)
        working-directory: backend
        run: pip-audit -r requirements.txt --skip-editable

  test-backend:
    needs: lint-and-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install Dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run Pytest
        working-directory: backend
        run: pytest

  test-frontend:
    needs: lint-and-audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Node Dependencies
        working-directory: electron
        run: |
          npm ci
          cd src/renderer && npm ci --legacy-peer-deps

      - name: Compile Electron Main Process
        working-directory: electron
        run: npx tsc -p tsconfig.main.json

      - name: Build Renderer
        working-directory: electron/src/renderer
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start Backend
        working-directory: backend
        shell: bash
        run: python main.py &

      - name: Wait for Backend
        shell: bash
        run: |
          echo "Waiting for backend on :8000..."
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/system/health -o /dev/null && echo "Backend ready" && break || sleep 1
          done

      - name: Seed Test Data
        shell: bash
        run: |
          echo "Creating test product..."
          curl -sf -X POST http://localhost:8000/products \
            -H "Content-Type: application/json" \
            -d '{"name":"Test Product","barcode":"TESTSKU01","price_selling":100,"price_buying":50,"stock_quantity":20}' \
            -o /dev/null && echo "Product created" || echo "Product creation failed (may already exist)"

          echo "Opening shift for admin (staff_id=1)..."
          curl -sf -X POST http://localhost:8000/shifts/open \
            -H "Content-Type: application/json" \
            -d '{"staff_id": 1, "opening_float": 0}' \
            -o /dev/null && echo "Shift opened" || echo "Shift already open or failed"

      - name: Install Playwright Browsers
        working-directory: electron
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        working-directory: electron
        run: npx playwright test

  build-production:
    needs: [test-backend, test-frontend]
    runs-on: windows-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Build Backend (PyInstaller)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          .\build_backend.bat

      - name: Build Electron App
        working-directory: electron
        run: |
          npm ci
          cd src/renderer && npm ci --legacy-peer-deps
          npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DukaPOS-Installer
          path: electron/dist/*.exe
